name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Read version
        id: ver
        run: echo "version=$(python -c 'import irq; print(irq.__version__)')" >> "$GITHUB_OUTPUT"

      - name: Check whether this release already exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "v${{ steps.ver.outputs.version }}" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release v${{ steps.ver.outputs.version }} already exists; skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dev dependencies
        if: steps.check.outputs.exists == 'false'
        run: |
          python -m pip install --upgrade pip build
          pip install -r requirements-dev.txt

      - name: Lint and test
        if: steps.check.outputs.exists == 'false'
        run: |
          ruff check .
          ruff format --check .
          python -m pytest -q

      - name: Build sdist and wheel
        if: steps.check.outputs.exists == 'false'
        run: python -m build

      - name: Create GitHub release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.ver.outputs.version }}" \
            --repo "$GITHUB_REPOSITORY" \
            --title "irq-affinity ${{ steps.ver.outputs.version }}" \
            --target "$GITHUB_SHA" \
            --generate-notes \
            dist/*
